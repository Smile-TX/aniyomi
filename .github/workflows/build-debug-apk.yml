name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Find APK
        run: find app/build/outputs/apk -name "*.apk" | tee apk-paths.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aniyomi-debug-apk
          path: app/build/outputs/apk/
          retention-days: 7
